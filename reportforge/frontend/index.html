<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ReportForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2d3154;--accent:#4f6ef7;--accent2:#7c9cff;--text:#e8eaf6;--text2:#9fa8c0;--danger:#f55;--success:#4caf50;--radius:8px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0}
.logo{font-weight:700;font-size:18px;letter-spacing:-.5px}.logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:2px;margin-left:8px}
.nav-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;transition:.15s}
.nav-tab:hover{background:var(--surface2);color:var(--text)}.nav-tab.active{background:var(--accent);color:#fff}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.main{flex:1;overflow-y:auto;padding:28px 32px}
.view{display:none}.view.active{display:block}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.12)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent2)}
.btn-danger{background:#2e1515;color:var(--danger);border:1px solid #4a2020}.btn-danger:hover{background:#3a1a1a}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:6px 8px;font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
.card-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}
.card-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.item-title{font-weight:600;font-size:14px;margin-bottom:4px}
.item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.item-actions{display:flex;gap:6px;margin-top:10px}
.field-group{margin-bottom:14px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px}
.field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--accent)}
.field-textarea{resize:vertical;min-height:80px}.field-select option{background:var(--surface2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-draft{background:#1e2a1e;color:#6fcf97}.badge-review{background:#2a2010;color:#f2c94c}.badge-final{background:#1a2040;color:#56ccf2}.badge-open{background:#2a1010;color:#eb5757}.badge-info{background:#1a1a2a;color:#9b9bd4}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:6px}
.section-body{padding:14px;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;margin-bottom:10px}
.finding-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:8px}
.finding-sev{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:6px}
.sev-critical{background:#3a0a0a;color:#ff4444}.sev-high{background:#3a1a0a;color:#ff8c00}.sev-medium{background:#2a2a0a;color:#ffd700}.sev-low{background:#0a2a0a;color:#90ee90}.sev-info{background:#0a0a2a;color:#87ceeb}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:540px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;flex-shrink:0}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.editor-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;height:calc(100vh - 130px)}
.editor-main{display:flex;flex-direction:column;min-height:0}
.editor-tabs{display:flex;gap:2px;margin-bottom:14px}
.editor-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none}
.editor-tab.active{background:var(--surface2);color:var(--text)}
.editor-panel{display:none;flex:1;overflow-y:auto}.editor-panel.active{display:block}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:20px;min-height:300px;font-size:13px;line-height:1.6}
.preview-box h2{font-size:15px;font-weight:700;margin:16px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.preview-box p{color:var(--text2);margin-bottom:8px}
.sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;overflow-y:auto}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent)}.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.toast-root{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;animation:slideIn .2s ease;min-width:220px}
.toast-success{background:#1a3a1a;color:#6fcf97;border:1px solid #2a5a2a}
.toast-error{background:#3a1010;color:#ff6b6b;border:1px solid #5a2020}
.toast-info{background:#1a1a3a;color:#9b9bd4;border:1px solid #2a2a5a}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Report<span>Forge</span></div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-nav="dash">Dashboard</button>
      <button class="nav-tab" data-nav="reports">Reports</button>
      <button class="nav-tab" data-nav="findings">Findings</button>
      <button class="nav-tab" data-nav="templates">Templates</button>
    </nav>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div class="main">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dash">
      <div class="page-hdr"><span class="page-title">Dashboard</span></div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total Reports</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-draft">0</div><div class="stat-label">Draft</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-review">0</div><div class="stat-label">In Review</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-final">0</div><div class="stat-label">Final</div></div>
      </div>
      <div class="card">
        <div style="font-weight:600;margin-bottom:12px">Recent Reports</div>
        <div id="dash-recent"></div>
      </div>
    </div>

    <!-- REPORTS -->
    <div class="view" id="view-reports">
      <div class="page-hdr">
        <span class="page-title">Reports</span>
        <button class="btn btn-primary" id="btn-new-report">+ New Report</button>
      </div>
      <input class="field-input" id="rpt-search" placeholder="Search reports..." style="margin-bottom:14px">
      <div id="reports-list"></div>
    </div>

    <!-- REPORT EDITOR -->
    <div class="view" id="view-editor">
      <div class="page-hdr" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-nav="reports">&#8592; Reports</button>
          <span class="page-title" id="editor-title">Report Editor</span>
          <span id="editor-dirty" style="color:var(--text2);font-size:12px"></span>
        </div>
        <div style="display:flex;gap:8px">
          <select class="field-select" id="editor-status" style="width:auto">
            <option value="draft">Draft</option>
            <option value="review">In Review</option>
            <option value="final">Final</option>
          </select>
          <button class="btn btn-primary btn-sm" id="btn-save-editor">Save</button>
        </div>
      </div>
      <div class="editor-layout">
        <div class="editor-main">
          <div class="editor-tabs">
            <button class="editor-tab active" data-tab="info">Info</button>
            <button class="editor-tab" data-tab="sections">Sections</button>
            <button class="editor-tab" data-tab="findings">Findings</button>
            <button class="editor-tab" data-tab="preview">Preview</button>
          </div>
          <div class="editor-panel active" id="ed-info">
            <div class="field-group"><label class="field-label">Title</label><input class="field-input" id="ed-title"></div>
            <div class="form-row">
              <div class="field-group"><label class="field-label">Client / Org</label><input class="field-input" id="ed-org"></div>
              <div class="field-group"><label class="field-label">Assessor</label><input class="field-input" id="ed-assessor"></div>
            </div>
            <div class="form-row">
              <div class="field-group"><label class="field-label">Start Date</label><input class="field-input" type="date" id="ed-start"></div>
              <div class="field-group"><label class="field-label">End Date</label><input class="field-input" type="date" id="ed-end"></div>
            </div>
            <div class="field-group"><label class="field-label">Executive Summary</label><textarea class="field-textarea" id="ed-summary" rows="5"></textarea></div>
          </div>
          <div class="editor-panel" id="ed-sections"><div id="ed-sections-body"></div></div>
          <div class="editor-panel" id="ed-findings">
            <div class="page-hdr" style="margin-bottom:10px">
              <span style="font-weight:600">Findings</span>
              <button class="btn btn-primary btn-sm" id="btn-add-finding-editor">+ Add Finding</button>
            </div>
            <div id="ed-findings-list"></div>
          </div>
          <div class="editor-panel" id="ed-preview">
            <div class="preview-box" id="preview-content"></div>
          </div>
        </div>
        <div class="sidebar" id="editor-sidebar"></div>
      </div>
    </div>

    <!-- FINDINGS VIEW -->
    <div class="view" id="view-findings">
      <div class="page-hdr">
        <span class="page-title">Findings</span>
        <button class="btn btn-primary" id="btn-add-finding-global">+ Add Finding</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <select class="field-select" id="findings-rpt-sel" style="flex:1">
          <option value="">All Reports</option>
        </select>
        <select class="field-select" id="findings-sev-sel" style="width:140px">
          <option value="">All Severities</option>
          <option>Critical</option><option>High</option><option>Medium</option><option>Low</option><option>Info</option>
        </select>
      </div>
      <div id="findings-list"></div>
    </div>

    <!-- TEMPLATES -->
    <div class="view" id="view-templates">
      <div class="page-hdr">
        <span class="page-title">Templates</span>
        <button class="btn btn-primary" id="btn-new-template">+ New Template</button>
      </div>
      <div id="templates-list"></div>
    </div>

    <!-- TEMPLATE EDITOR -->
    <div class="view" id="view-template-editor">
      <div class="page-hdr" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-nav="templates">&#8592; Templates</button>
          <span class="page-title" id="ted-title">Template Editor</span>
          <span id="ted-dirty" style="color:var(--text2);font-size:12px"></span>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-save-template">Save Template</button>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="field-group"><label class="field-label">Template Name</label><input class="field-input" id="ted-name"></div>
        <div class="field-group"><label class="field-label">Description</label><input class="field-input" id="ted-desc"></div>
      </div>
      <div class="page-hdr" style="margin-bottom:10px">
        <span style="font-weight:600">Sections</span>
        <div style="display:flex;gap:8px">
          <select class="field-select" id="add-sec-type" style="width:auto">
            <option value="text">Text Section</option>
            <option value="table">Table</option>
            <option value="findings">Findings</option>
            <option value="checklist">Checklist</option>
          </select>
          <button class="btn btn-primary btn-sm" id="btn-add-section">+ Add Section</button>
        </div>
      </div>
      <div id="ted-sections"></div>
    </div>

  </div>
</div>

<!-- NEW REPORT MODAL -->
<div class="modal-overlay" id="modal-new-report">
  <div class="modal">
    <div class="modal-hdr"><span>New Report</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-new-report">&#10005;</button></div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Title</label><input class="field-input" id="nr-title" placeholder="Report title"></div>
      <div class="field-group"><label class="field-label">Template</label>
        <select class="field-select" id="nr-template"><option value="">None (blank)</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-new-report">Cancel</button>
      <button class="btn btn-primary" id="btn-create-report">Create</button>
    </div>
  </div>
</div>

<!-- NEW TEMPLATE MODAL -->
<div class="modal-overlay" id="modal-new-template">
  <div class="modal">
    <div class="modal-hdr"><span>New Template</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-new-template">&#10005;</button></div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Template Name</label><input class="field-input" id="nt-name" placeholder="e.g. Web App Pentest"></div>
      <div class="field-group"><label class="field-label">Description</label><input class="field-input" id="nt-desc" placeholder="Optional description"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-new-template">Cancel</button>
      <button class="btn btn-primary" id="btn-create-template">Create</button>
    </div>
  </div>
</div>

<!-- FINDING MODAL -->
<div class="modal-overlay" id="modal-finding">
  <div class="modal">
    <div class="modal-hdr"><span id="fm-title">Add Finding</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-finding">&#10005;</button></div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Report</label>
        <select class="field-select" id="fm-report"></select>
      </div>
      <div class="field-group"><label class="field-label">Title</label><input class="field-input" id="fm-ftitle" placeholder="Finding title"></div>
      <div class="form-row">
        <div class="field-group"><label class="field-label">Severity</label>
          <select class="field-select" id="fm-severity">
            <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option><option>Info</option>
          </select>
        </div>
        <div class="field-group"><label class="field-label">Status</label>
          <select class="field-select" id="fm-status">
            <option value="open">Open</option><option value="remediated">Remediated</option><option value="accepted">Accepted</option>
          </select>
        </div>
      </div>
      <div class="field-group"><label class="field-label">Description</label><textarea class="field-textarea" id="fm-desc" rows="4"></textarea></div>
      <div class="field-group"><label class="field-label">Recommendation</label><textarea class="field-textarea" id="fm-rec" rows="3"></textarea></div>
      <div class="field-group"><label class="field-label">CVSS Score</label><input class="field-input" id="fm-cvss" type="number" min="0" max="10" step="0.1" placeholder="0.0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-finding">Cancel</button>
      <button class="btn btn-primary" id="btn-save-finding">Save Finding</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="width:380px">
    <div class="modal-hdr"><span>Confirm Delete</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-confirm">&#10005;</button></div>
    <div class="modal-body"><p id="confirm-msg" style="color:var(--text2)"></p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-confirm">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<div class="toast-root" id="toast-root"></div>

<script>
(function() {
"use strict";

//  State 
var S = {
  reports: [], templates: [], findings: [],
  currentReport: null, currentTemplate: null,
  edDirty: false, tedDirty: false,
  saveTimer: null, editingFindingId: null
};

//  Helpers 
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleDateString(); } catch(e) { return s; }
}
function badge(status) {
  var map = {draft:'badge-draft',review:'badge-review',final:'badge-final',
             open:'badge-open',info:'badge-info',remediated:'badge-info',accepted:'badge-info'};
  return '<span class="badge ' + (map[String(status).toLowerCase()] || 'badge-info') + '">' + esc(status) + '</span>';
}
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'success');
  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}
function $(id) { return document.getElementById(id); }
function val(id) { return $(id) ? $(id).value : ''; }
function setVal(id, v) { if ($(id)) $(id).value = v == null ? '' : v; }

async function api(path, opts) {
  var res = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'}}, opts || {}));
  if (!res.ok) { var t = await res.text(); throw new Error(t || res.statusText); }
  if (res.status === 204) return null;
  return res.json();
}

function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

function showView(name) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  var v = $('view-' + name);
  if (v) v.classList.add('active');
  document.querySelectorAll('.nav-tab[data-nav="' + name + '"]').forEach(function(t){ t.classList.add('active'); });
  if (name === 'reports') renderReportsList();
  if (name === 'findings') { populateFindingsSelect(); renderFindingsView(); }
  if (name === 'templates') renderTemplatesList();
  if (name === 'dash') renderDash();
}

//  Load 
async function loadAll() {
  try {
    var res = await Promise.all([api('/api/reports'), api('/api/templates'), api('/api/findings')]);
    S.reports   = res[0] || [];
    S.templates = res[1] || [];
    S.findings  = res[2] || [];
    renderDash();
    populateNRTemplates();
    populateFindingsSelect();
  } catch(e) { toast('Load error: ' + e.message, 'error'); }
}

//  Dashboard 
function renderDash() {
  var r = S.reports;
  $('stat-total').textContent  = r.length;
  $('stat-draft').textContent  = r.filter(function(x){ return x.status==='draft'; }).length;
  $('stat-review').textContent = r.filter(function(x){ return x.status==='review'; }).length;
  $('stat-final').textContent  = r.filter(function(x){ return x.status==='final'; }).length;
  var recent = r.slice().sort(function(a,b){ return (b.updated_at||'').localeCompare(a.updated_at||''); }).slice(0,5);
  var el = $('dash-recent');
  if (!recent.length) { el.innerHTML='<div class="empty-state"><p>No reports yet.</p></div>'; return; }
  var rows = recent.map(function(r){
    return '<tr data-open-report="' + r.id + '" style="cursor:pointer">' +
      '<td>' + esc(r.title) + '</td><td>' + badge(r.status) + '</td><td>' + fmtDate(r.updated_at) + '</td></tr>';
  }).join('');
  el.innerHTML = '<table><thead><tr><th>Title</th><th>Status</th><th>Updated</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

//  Reports 
function renderReportsList() {
  var q = val('rpt-search').toLowerCase();
  var list = S.reports.filter(function(r){ return !q || (r.title||'').toLowerCase().includes(q); });
  var el = $('reports-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><p>' + (q ? 'No matching reports.' : 'No reports yet. Create one!') + '</p></div>';
    return;
  }
  el.innerHTML = '<div class="card-grid">' + list.map(function(r){
    return '<div class="card-item">' +
      '<div class="item-title">' + esc(r.title) + '</div>' +
      '<div class="item-meta">' + badge(r.status) + ' &bull; ' + fmtDate(r.updated_at) + '</div>' +
      '<div class="item-actions">' +
        '<button class="btn btn-primary btn-sm" data-open-report="' + r.id + '">Open</button>' +
        '<button class="btn btn-danger btn-sm" data-del-type="report" data-del-id="' + r.id + '" data-del-name="' + esc(r.title) + '">Delete</button>' +
      '</div></div>';
  }).join('') + '</div>';
}

function openNewReportModal() {
  populateNRTemplates();
  setVal('nr-title','');
  openModal('modal-new-report');
}
function populateNRTemplates() {
  var sel = $('nr-template'); if (!sel) return;
  sel.innerHTML = '<option value="">None (blank)</option>' +
    S.templates.map(function(t){ return '<option value="' + t.id + '">' + esc(t.name) + '</option>'; }).join('');
}
async function createReport() {
  var title = val('nr-title').trim();
  if (!title) { toast('Title required','error'); return; }
  var tid = val('nr-template');
  try {
    var r = await api('/api/reports',{method:'POST',body:JSON.stringify({
      title:title, template_id: tid ? parseInt(tid) : null, status:'draft', sections:[], meta:{}
    })});
    S.reports.unshift(r);
    closeModal('modal-new-report');
    toast('Report created');
    openReportEditor(r.id);
  } catch(e) { toast('Create failed: '+e.message,'error'); }
}

//  Editor 
async function openReportEditor(id) {
  try {
    var r = await api('/api/reports/' + id);
    S.currentReport = r; S.edDirty = false;
    $('editor-title').textContent = r.title || 'Untitled';
    $('editor-dirty').textContent = '';
    setVal('editor-status', r.status || 'draft');
    setVal('ed-title', r.title);
    var m = r.meta || {};
    setVal('ed-org',       m.org        || '');
    setVal('ed-assessor',  m.assessor   || '');
    setVal('ed-start',     m.start_date || '');
    setVal('ed-end',       m.end_date   || '');
    setVal('ed-summary',   m.summary    || '');
    renderEdSections();
    renderEdFindings();
    switchEdTab('info');
    showView('editor');
  } catch(e) { toast('Open failed: '+e.message,'error'); }
}
function switchEdTab(name) {
  document.querySelectorAll('.editor-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.editor-panel').forEach(function(p){ p.classList.remove('active'); });
  var p = $('ed-' + name); if (p) p.classList.add('active');
  document.querySelectorAll('.editor-tab[data-tab="' + name + '"]').forEach(function(t){ t.classList.add('active'); });
  if (name === 'preview') renderEdPreview();
}
function markDirty() {
  S.edDirty = true;
  $('editor-dirty').textContent = ' unsaved';
  clearTimeout(S.saveTimer);
  S.saveTimer = setTimeout(saveEditorNow, 2000);
}
async function saveEditorNow() {
  if (!S.currentReport) return;
  var title = val('ed-title').trim() || S.currentReport.title;
  try {
    var updated = await api('/api/reports/' + S.currentReport.id, {method:'PUT', body:JSON.stringify({
      title: title, status: S.currentReport.status,
      sections: S.currentReport.sections || [],
      meta: { org: val('ed-org'), assessor: val('ed-assessor'),
              start_date: val('ed-start'), end_date: val('ed-end'), summary: val('ed-summary') }
    })});
    S.currentReport = updated; S.edDirty = false;
    $('editor-dirty').textContent = '';
    $('editor-title').textContent = updated.title;
    var idx = S.reports.findIndex(function(r){ return r.id === updated.id; });
    if (idx >= 0) S.reports[idx] = updated;
    toast('Saved');
  } catch(e) { toast('Save failed: '+e.message,'error'); }
}
async function updateReportStatus() {
  if (!S.currentReport) return;
  S.currentReport.status = val('editor-status');
  await saveEditorNow();
}
function renderEdSections() {
  var el = $('ed-sections-body'); if (!el) return;
  var secs = (S.currentReport && S.currentReport.sections) || [];
  if (!secs.length) { el.innerHTML='<div class="empty-state"><p>No sections. Apply a template or add sections.</p></div>'; return; }
  el.innerHTML = secs.map(function(sec, i){
    var fields = (sec.fields||[]).map(function(f){
      return '<div class="field-group"><label class="field-label">' + esc(f.label) + '</label>' +
        (f.type==='textarea'
          ? '<textarea class="field-textarea">' + esc(f.value||'') + '</textarea>'
          : '<input class="field-input" type="' + esc(f.type||'text') + '" value="' + esc(f.value||'') + '">') +
        '</div>';
    }).join('');
    return '<div class="section-hdr" data-toggle-sec="' + i + '">' +
        esc(sec.title||'Section '+(i+1)) + '<span style="font-size:11px;color:var(--text2)">' + esc(sec.type||'') + '</span></div>' +
      '<div class="section-body" id="rpt-sec-' + i + '">' + (fields || '<p style="color:var(--text2);font-size:13px">No fields.</p>') + '</div>';
  }).join('');
}
function renderEdPreview() {
  var r = S.currentReport; if (!r) return;
  var m = r.meta || {};
  var html = '<h1 style="font-size:18px;font-weight:700;margin-bottom:8px">' + esc(r.title) + '</h1>';
  if (m.org)       html += '<p><strong>Organization:</strong> ' + esc(m.org) + '</p>';
  if (m.assessor)  html += '<p><strong>Assessor:</strong> ' + esc(m.assessor) + '</p>';
  if (m.summary)   html += '<h2>Executive Summary</h2><p>' + esc(m.summary).replace(/
/g,'<br>') + '</p>';
  (r.sections||[]).forEach(function(sec){
    html += '<h2>' + esc(sec.title) + '</h2>';
    (sec.fields||[]).forEach(function(f){ html += '<p><strong>' + esc(f.label) + ':</strong> ' + esc(f.value||'') + '</p>'; });
  });
  var rf = S.findings.filter(function(f){ return f.report_id === r.id; });
  if (rf.length) {
    html += '<h2>Findings (' + rf.length + ')</h2>';
    rf.forEach(function(f){ html += '<div style="margin-bottom:10px"><strong>' + esc(f.title) + '</strong> ' + badge(f.severity||'info') + '<p style="margin-top:4px">' + esc(f.description||'') + '</p></div>'; });
  }
  $('preview-content').innerHTML = html;
}

//  Findings 
function renderEdFindings() {
  var el = $('ed-findings-list'); if (!el || !S.currentReport) return;
  var list = S.findings.filter(function(f){ return f.report_id === S.currentReport.id; });
  if (!list.length) { el.innerHTML='<div class="empty-state"><p>No findings for this report.</p></div>'; return; }
  el.innerHTML = list.map(buildFindingCard).join('');
}
function buildFindingCard(f) {
  var sev = (f.severity||'info').toLowerCase();
  return '<div class="finding-card">' +
    '<div style="display:flex;align-items:center;margin-bottom:6px">' +
      '<span class="finding-sev sev-' + sev + '">' + esc(f.severity) + '</span>' +
      '<strong>' + esc(f.title) + '</strong>' +
      '<span style="margin-left:auto">' + badge(f.status||'open') + '</span>' +
    '</div>' +
    '<div style="color:var(--text2);font-size:12px;margin-bottom:8px">' + esc(f.description||'') + '</div>' +
    '<div class="item-actions">' +
      '<button class="btn btn-ghost btn-sm" data-edit-finding="' + f.id + '">Edit</button>' +
      '<button class="btn btn-danger btn-sm" data-del-type="finding" data-del-id="' + f.id + '" data-del-name="' + esc(f.title) + '">Delete</button>' +
    '</div></div>';
}
function openFindingModal(reportId) {
  S.editingFindingId = null;
  $('fm-title').textContent = 'Add Finding';
  setVal('fm-ftitle',''); setVal('fm-desc',''); setVal('fm-rec','');
  setVal('fm-cvss',''); setVal('fm-severity','Medium'); setVal('fm-status','open');
  populateFmReport(reportId != null ? reportId : (S.currentReport ? S.currentReport.id : null));
  openModal('modal-finding');
}
function editFinding(id) {
  var f = S.findings.find(function(x){ return x.id === id; }); if (!f) return;
  S.editingFindingId = id;
  $('fm-title').textContent = 'Edit Finding';
  setVal('fm-ftitle', f.title); setVal('fm-desc', f.description||'');
  setVal('fm-rec', f.recommendation||''); setVal('fm-cvss', f.cvss||'');
  setVal('fm-severity', f.severity||'Medium'); setVal('fm-status', f.status||'open');
  populateFmReport(f.report_id);
  openModal('modal-finding');
}
function populateFmReport(selectedId) {
  var sel = $('fm-report'); if (!sel) return;
  sel.innerHTML = S.reports.map(function(r){
    return '<option value="' + r.id + '"' + (r.id === selectedId ? ' selected' : '') + '>' + esc(r.title) + '</option>';
  }).join('');
}
async function saveFinding() {
  var title = val('fm-ftitle').trim();
  if (!title) { toast('Title required','error'); return; }
  var payload = { report_id: parseInt(val('fm-report')), title: title,
    severity: val('fm-severity'), status: val('fm-status'),
    description: val('fm-desc'), recommendation: val('fm-rec'),
    cvss: parseFloat(val('fm-cvss')) || null };
  try {
    if (S.editingFindingId) {
      var u = await api('/api/findings/' + S.editingFindingId, {method:'PUT',body:JSON.stringify(payload)});
      var idx = S.findings.findIndex(function(f){ return f.id === S.editingFindingId; });
      if (idx >= 0) S.findings[idx] = u;
      toast('Finding updated');
    } else {
      var c = await api('/api/findings', {method:'POST',body:JSON.stringify(payload)});
      S.findings.push(c);
      toast('Finding added');
    }
    closeModal('modal-finding');
    renderEdFindings(); renderFindingsView();
  } catch(e) { toast('Save failed: '+e.message,'error'); }
}
function populateFindingsSelect() {
  var sel = $('findings-rpt-sel'); if (!sel) return;
  var cur = sel.value;
  sel.innerHTML = '<option value="">All Reports</option>' +
    S.reports.map(function(r){ return '<option value="' + r.id + '">' + esc(r.title) + '</option>'; }).join('');
  if (cur) sel.value = cur;
}
function renderFindingsView() {
  var rptId = parseInt(val('findings-rpt-sel')) || 0;
  var sev   = val('findings-sev-sel');
  var list  = S.findings.filter(function(f){
    if (rptId && f.report_id !== rptId) return false;
    if (sev && f.severity !== sev) return false;
    return true;
  });
  var el = $('findings-list'); if (!el) return;
  if (!list.length) { el.innerHTML='<div class="empty-state"><p>No findings found.</p></div>'; return; }
  var order = {Critical:0,High:1,Medium:2,Low:3,Info:4};
  list.sort(function(a,b){ return (order[a.severity]||5)-(order[b.severity]||5); });
  el.innerHTML = list.map(buildFindingCard).join('');
}

//  Templates 
function renderTemplatesList() {
  var el = $('templates-list'); if (!el) return;
  if (!S.templates.length) { el.innerHTML='<div class="empty-state"><p>No templates yet.</p></div>'; return; }
  el.innerHTML = '<div class="card-grid">' + S.templates.map(function(t){
    return '<div class="card-item">' +
      '<div class="item-title">' + esc(t.name) + '</div>' +
      '<div class="item-meta">' + esc(t.description||'') + ' &bull; ' + (t.sections||[]).length + ' sections</div>' +
      '<div class="item-actions">' +
        '<button class="btn btn-primary btn-sm" data-open-template="' + t.id + '">Edit</button>' +
        '<button class="btn btn-danger btn-sm" data-del-type="template" data-del-id="' + t.id + '" data-del-name="' + esc(t.name) + '">Delete</button>' +
      '</div></div>';
  }).join('') + '</div>';
}
function openNewTemplateModal() {
  setVal('nt-name',''); setVal('nt-desc','');
  openModal('modal-new-template');
}
async function createTemplate() {
  var name = val('nt-name').trim();
  if (!name) { toast('Name required','error'); return; }
  try {
    var t = await api('/api/templates',{method:'POST',body:JSON.stringify({name:name,description:val('nt-desc'),sections:[]})});
    S.templates.push(t);
    closeModal('modal-new-template');
    toast('Template created');
    openTemplateEditor(t.id);
  } catch(e) { toast('Failed: '+e.message,'error'); }
}
async function openTemplateEditor(id) {
  try {
    var t = await api('/api/templates/' + id);
    S.currentTemplate = t; S.tedDirty = false;
    $('ted-title').textContent = t.name || 'Template Editor';
    $('ted-dirty').textContent = '';
    setVal('ted-name', t.name); setVal('ted-desc', t.description||'');
    renderTSections();
    showView('template-editor');
  } catch(e) { toast('Failed: '+e.message,'error'); }
}
function markTDirty() {
  S.tedDirty = true;
  $('ted-dirty').textContent = ' unsaved';
}
function addSection() {
  if (!S.currentTemplate) return;
  var type = val('add-sec-type');
  S.currentTemplate.sections = S.currentTemplate.sections || [];
  S.currentTemplate.sections.push({title:'New '+type+' section', type:type, fields:[]});
  markTDirty(); renderTSections();
}
function renderTSections() {
  var el = $('ted-sections'); if (!el) return;
  var secs = (S.currentTemplate && S.currentTemplate.sections) || [];
  if (!secs.length) { el.innerHTML='<div class="empty-state"><p>No sections yet.</p></div>'; return; }
  el.innerHTML = secs.map(function(sec, si){
    var fieldRows = (sec.fields||[]).map(function(f, fi){
      return '<div class="form-row" style="margin-bottom:8px;align-items:end">' +
        '<div class="field-group" style="margin:0"><label class="field-label">Label</label>' +
          '<input class="field-input" data-sec="' + si + '" data-fi="' + fi + '" data-prop="label" value="' + esc(f.label||'') + '"></div>' +
        '<div class="field-group" style="margin:0"><label class="field-label">Type</label>' +
          '<select class="field-select" data-sec="' + si + '" data-fi="' + fi + '" data-prop="type">' +
            ['text','textarea','date','number','select'].map(function(o){
              return '<option value="' + o + '"' + (f.type===o?' selected':'') + '>' + o + '</option>';
            }).join('') +
          '</select></div>' +
        '<button class="btn btn-danger btn-sm btn-icon" data-remove-field="' + fi + '" data-sec="' + si + '">&#10005;</button>' +
      '</div>';
    }).join('');
    return '<div class="card" style="margin-bottom:12px">' +
      '<div class="section-hdr" style="margin-bottom:10px">' +
        '<input class="field-input" style="width:auto;flex:1" data-sec-title="' + si + '" value="' + esc(sec.title) + '">' +
        '<div style="display:flex;gap:6px;margin-left:8px">' +
          '<span style="font-size:12px;color:var(--text2);align-self:center">' + esc(sec.type) + '</span>' +
          '<button class="btn btn-danger btn-sm btn-icon" data-remove-sec="' + si + '">&#10005;</button>' +
        '</div>' +
      '</div>' +
      (fieldRows || '<p style="color:var(--text2);font-size:12px">No fields.</p>') +
      '<button class="btn btn-secondary btn-sm" style="margin-top:8px" data-add-field="' + si + '">+ Add Field</button>' +
    '</div>';
  }).join('');
}
function removeSection(si) {
  if (!S.currentTemplate) return;
  S.currentTemplate.sections.splice(si, 1);
  markTDirty(); renderTSections();
}
function addField(si) {
  if (!S.currentTemplate) return;
  S.currentTemplate.sections[si].fields = S.currentTemplate.sections[si].fields || [];
  S.currentTemplate.sections[si].fields.push({label:'New Field',type:'text',value:''});
  markTDirty(); renderTSections();
}
function removeField(si, fi) {
  if (!S.currentTemplate) return;
  S.currentTemplate.sections[si].fields.splice(fi, 1);
  markTDirty(); renderTSections();
}
async function saveTemplate() {
  if (!S.currentTemplate) return;
  var name = val('ted-name').trim();
  if (!name) { toast('Name required','error'); return; }
  S.currentTemplate.name = name;
  S.currentTemplate.description = val('ted-desc');
  try {
    var u = await api('/api/templates/' + S.currentTemplate.id, {method:'PUT',body:JSON.stringify({
      name: S.currentTemplate.name, description: S.currentTemplate.description,
      sections: S.currentTemplate.sections
    })});
    S.currentTemplate = u; S.tedDirty = false;
    $('ted-dirty').textContent = '';
    var idx = S.templates.findIndex(function(t){ return t.id === u.id; });
    if (idx >= 0) S.templates[idx] = u;
    toast('Template saved');
  } catch(e) { toast('Save failed: '+e.message,'error'); }
}

//  Delete 
function confirmDelete(type, id, name) {
  $('confirm-msg').textContent = 'Delete "' + name + '"? This cannot be undone.';
  $('confirm-ok').onclick = function(){ doDelete(type, id); closeModal('modal-confirm'); };
  openModal('modal-confirm');
}
async function doDelete(type, id) {
  try {
    await api('/api/' + type + 's/' + id, {method:'DELETE'});
    if (type === 'report') {
      S.reports  = S.reports.filter(function(r){ return r.id !== id; });
      S.findings = S.findings.filter(function(f){ return f.report_id !== id; });
      renderReportsList(); renderDash();
    } else if (type === 'template') {
      S.templates = S.templates.filter(function(t){ return t.id !== id; });
      renderTemplatesList();
    } else if (type === 'finding') {
      S.findings = S.findings.filter(function(f){ return f.id !== id; });
      renderEdFindings(); renderFindingsView();
    }
    toast(type.charAt(0).toUpperCase()+type.slice(1)+' deleted');
  } catch(e) { toast('Delete failed: '+e.message,'error'); }
}

//  Event Delegation 
document.addEventListener('click', function(e) {
  var t = e.target;

  // nav tabs
  var nav = t.closest('[data-nav]');
  if (nav) { showView(nav.getAttribute('data-nav')); return; }

  // close modal
  var cm = t.closest('[data-close-modal]');
  if (cm) { closeModal(cm.getAttribute('data-close-modal')); return; }

  // editor tabs
  var et = t.closest('[data-tab]');
  if (et) { switchEdTab(et.getAttribute('data-tab')); return; }

  // open report
  var or = t.closest('[data-open-report]');
  if (or) { e.stopPropagation(); openReportEditor(parseInt(or.getAttribute('data-open-report'))); return; }

  // open template
  var ot = t.closest('[data-open-template]');
  if (ot) { openTemplateEditor(parseInt(ot.getAttribute('data-open-template'))); return; }

  // edit finding
  var ef = t.closest('[data-edit-finding]');
  if (ef) { editFinding(parseInt(ef.getAttribute('data-edit-finding'))); return; }

  // delete
  var del = t.closest('[data-del-type]');
  if (del) {
    e.stopPropagation();
    confirmDelete(del.getAttribute('data-del-type'), parseInt(del.getAttribute('data-del-id')), del.getAttribute('data-del-name'));
    return;
  }

  // toggle section
  var ts = t.closest('[data-toggle-sec]');
  if (ts) {
    var idx = parseInt(ts.getAttribute('data-toggle-sec'));
    var sb = $('rpt-sec-' + idx);
    if (sb) sb.style.display = sb.style.display === 'none' ? '' : 'none';
    return;
  }

  // template section actions
  var rs = t.closest('[data-remove-sec]');
  if (rs) { removeSection(parseInt(rs.getAttribute('data-remove-sec'))); return; }

  var af = t.closest('[data-add-field]');
  if (af) { addField(parseInt(af.getAttribute('data-add-field'))); return; }

  var rf2 = t.closest('[data-remove-field]');
  if (rf2) { removeField(parseInt(rf2.getAttribute('data-sec')), parseInt(rf2.getAttribute('data-remove-field'))); return; }

  // static button IDs
  var id = t.id || (t.closest('button') && t.closest('button').id);
  if (id === 'btn-new-report')         { openNewReportModal(); return; }
  if (id === 'btn-create-report')      { createReport(); return; }
  if (id === 'btn-save-editor')        { saveEditorNow(); return; }
  if (id === 'btn-add-finding-editor') { openFindingModal(S.currentReport ? S.currentReport.id : null); return; }
  if (id === 'btn-add-finding-global') { openFindingModal(null); return; }
  if (id === 'btn-save-finding')       { saveFinding(); return; }
  if (id === 'btn-new-template')       { openNewTemplateModal(); return; }
  if (id === 'btn-create-template')    { createTemplate(); return; }
  if (id === 'btn-save-template')      { saveTemplate(); return; }
  if (id === 'btn-add-section')        { addSection(); return; }
});

// Change listeners
document.addEventListener('change', function(e) {
  var t = e.target;
  if (t.id === 'editor-status') { updateReportStatus(); return; }
  if (t.id === 'findings-rpt-sel' || t.id === 'findings-sev-sel') { renderFindingsView(); return; }
  // template field property changes
  var sec = t.getAttribute('data-sec');
  var fi  = t.getAttribute('data-fi');
  var prop = t.getAttribute('data-prop');
  if (sec !== null && fi !== null && prop) {
    S.currentTemplate.sections[parseInt(sec)].fields[parseInt(fi)][prop] = t.value;
    markTDirty(); renderTSections();
  }
});

document.addEventListener('input', function(e) {
  var t = e.target;
  var edFields = ['ed-title','ed-org','ed-assessor','ed-start','ed-end','ed-summary'];
  if (edFields.indexOf(t.id) >= 0) { markDirty(); return; }
  if (t.id === 'rpt-search') { renderReportsList(); return; }
  // template section title
  var st = t.getAttribute('data-sec-title');
  if (st !== null) {
    S.currentTemplate.sections[parseInt(st)].title = t.value;
    markTDirty();
    return;
  }
  // template field label inline
  var sec = t.getAttribute('data-sec');
  var fi  = t.getAttribute('data-fi');
  var prop = t.getAttribute('data-prop');
  if (sec !== null && fi !== null && prop) {
    S.currentTemplate.sections[parseInt(sec)].fields[parseInt(fi)][prop] = t.value;
    markTDirty();
  }
});

//  Boot 
loadAll();

})();
</script>

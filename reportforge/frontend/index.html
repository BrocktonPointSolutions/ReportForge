<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ReportForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f6fa;--surface:#fff;--surface2:#f0f1f8;--border:#d0d4e8;--accent:#4f6ef7;--accent2:#3a55d4;--text:#1a1d27;--text2:#555e80;--danger:#d32f2f;--success:#2e7d32;--radius:8px}body.dark{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2d3154;--accent:#4f6ef7;--accent2:#7c9cff;--text:#e8eaf6;--text2:#9fa8c0;--danger:#f55;--success:#4caf50}.theme-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:12px;transition:.15s}.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0}
.logo{font-weight:700;font-size:18px;letter-spacing:-.5px}.logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:2px;margin-left:8px}
.nav-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;transition:.15s}
.nav-tab:hover{background:var(--surface2);color:var(--text)}.nav-tab.active{background:var(--accent);color:#fff}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.main{flex:1;overflow-y:auto;padding:28px 32px}
.view{display:none}.view.active{display:block}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.12)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent2)}
.btn-danger{background:#2e1515;color:var(--danger);border:1px solid #4a2020}.btn-danger:hover{background:#3a1a1a}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:6px 8px;font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
.card-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}
.card-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.item-title{font-weight:600;font-size:14px;margin-bottom:4px}
.item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.item-actions{display:flex;gap:6px;margin-top:10px}
.field-group{margin-bottom:14px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px}
.field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--accent)}
.field-textarea{resize:vertical;min-height:80px}.field-select option{background:var(--surface2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-draft{background:#1e2a1e;color:#6fcf97}.badge-review{background:#2a2010;color:#f2c94c}.badge-final{background:#1a2040;color:#56ccf2}.badge-open{background:#2a1010;color:#eb5757}.badge-info{background:#1a1a2a;color:#9b9bd4}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:6px}
.section-body{padding:14px;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;margin-bottom:10px}
.finding-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:8px}
.finding-sev{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:6px}
.sev-critical{background:#3a0a0a;color:#ff4444}.sev-high{background:#3a1a0a;color:#ff8c00}.sev-medium{background:#2a2a0a;color:#ffd700}.sev-low{background:#0a2a0a;color:#90ee90}.sev-info{background:#0a0a2a;color:#87ceeb}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:540px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;flex-shrink:0}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.editor-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;height:calc(100vh - 130px)}
.editor-main{display:flex;flex-direction:column;min-height:0}
.editor-tabs{display:flex;gap:2px;margin-bottom:14px}
.editor-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none}
.editor-tab.active{background:var(--surface2);color:var(--text)}
.editor-panel{display:none;flex:1;overflow-y:auto}.editor-panel.active{display:block}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:20px;min-height:300px;font-size:13px;line-height:1.6}
.preview-box h2{font-size:15px;font-weight:700;margin:16px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.preview-box p{color:var(--text2);margin-bottom:8px}
.sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;overflow-y:auto}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent)}.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.toast-root{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;animation:slideIn .2s ease;min-width:220px}
.toast-success{background:#1a3a1a;color:#6fcf97;border:1px solid #2a5a2a}
.toast-error{background:#3a1010;color:#ff6b6b;border:1px solid #5a2020}
.toast-info{background:#1a1a3a;color:#9b9bd4;border:1px solid #2a2a5a}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.ql-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;min-height:80px}.ql-wrap .ql-editor{min-height:80px;color:var(--text);font-size:13px;padding:8px 12px}.ql-wrap .ql-toolbar{border:none;border-bottom:1px solid var(--border);background:var(--surface2);padding:4px 8px}.ql-wrap .ql-stroke{stroke:var(--text)!important}.ql-wrap .ql-fill{fill:var(--text)!important}.ql-wrap .ql-picker{color:var(--text)!important}.ql-wrap .ql-picker-options{background:var(--surface2)!important;border-color:var(--border)!important}.ql-wrap.ql-snow{border-radius:6px}</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css">
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Report<span>Forge</span></div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-nav="dash">Dashboard</button>
      <button class="nav-tab" data-nav="reports">Reports</button>
      <button class="nav-tab" data-nav="findings">Finding Templates</button>
      <button class="nav-tab" data-nav="templates">Templates</button>
    </nav>
    <div class="topbar-right" id="topbar-right"><button class="theme-btn" id="theme-toggle">Dark Mode</button></div>
  </div>
  <div class="main">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dash">
      <div class="page-hdr"><span class="page-title">Dashboard</span></div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total Reports</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-draft">0</div><div class="stat-label">Draft</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-review">0</div><div class="stat-label">In Review</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-final">0</div><div class="stat-label">Final</div></div>
      </div>
      <div class="card">
        <div style="font-weight:600;margin-bottom:12px">Recent Reports</div>
        <div id="dash-recent"></div>
      </div>
    </div>

    <!-- REPORTS -->
    <div class="view" id="view-reports">
      <div class="page-hdr">
        <span class="page-title">Reports</span>
        <button class="btn btn-primary" id="btn-new-report">+ New Report</button>
      </div>
      <input class="field-input" id="rpt-search" placeholder="Search reports..." style="margin-bottom:14px">
      <div id="reports-list"></div>
    </div>

    <!-- REPORT EDITOR -->
    <div class="view" id="view-editor">
      <div class="page-hdr" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-nav="reports">&#8592; Reports</button>
          <span class="page-title" id="editor-title">Report Editor</span>
          <span id="editor-dirty" style="color:var(--text2);font-size:12px"></span>
        </div>
        <div style="display:flex;gap:8px">
          <select class="field-select" id="editor-status" style="width:auto">
            <option value="draft">Draft</option>
            <option value="review">In Review</option>
            <option value="final">Final</option>
          </select>
          <button class="btn btn-primary btn-sm" id="btn-save-editor">Save</button>
        </div>
      </div>
      <div class="editor-layout">
        <div class="editor-main">
          <div class="editor-tabs">
            <button class="editor-tab active" data-tab="info">Info</button>
            <button class="editor-tab" data-tab="sections">Sections</button>
            <button class="editor-tab" data-tab="findings">Findings</button>
            <button class="editor-tab" data-tab="preview">Preview</button>
          </div>
          <div class="editor-panel active" id="ed-info">
            <div class="field-group"><label class="field-label">Title</label><input class="field-input" id="ed-title"></div>
            <div class="form-row">
              <div class="field-group"><label class="field-label">Client / Org</label><input class="field-input" id="ed-org"></div>
              <div class="field-group"><label class="field-label">Assessor</label><input class="field-input" id="ed-assessor"></div>
            </div>
            <div class="form-row">
              <div class="field-group"><label class="field-label">Start Date</label><input class="field-input" type="date" id="ed-start"></div>
              <div class="field-group"><label class="field-label">End Date</label><input class="field-input" type="date" id="ed-end"></div>
            </div>
            <div class="field-group"><label class="field-label">Executive Summary</label><textarea class="field-textarea" id="ed-summary" rows="5"></textarea></div>
          </div>
          <div class="editor-panel" id="ed-sections"><div id="ed-sections-body"></div></div>
          <div class="editor-panel" id="ed-findings">
            <div class="page-hdr" style="margin-bottom:10px">
              <span style="font-weight:600">Findings</span>
              <button class="btn btn-primary btn-sm" id="btn-add-finding-ed">+ Add from Template</button>
            </div>
            <div id="ed-findings-list"></div>
          </div>
          <div class="editor-panel" id="ed-preview">
            <div class="preview-box" id="preview-content"></div>
          </div>
        </div>
        <div class="sidebar" id="editor-sidebar"></div>
      </div>
    </div>

    <!-- FINDINGS VIEW -->
    <div class="view" id="view-findings">
      <div class="page-hdr">
        <span class="page-title">Finding Templates</span>
        <button class="btn btn-primary" id="btn-new-finding-tpl">+ New Template</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <select class="field-select" id="findings-rpt-sel" style="flex:1">
          <option value="">All Reports</option>
        </select>
        <select class="field-select" id="findings-sev-sel" style="width:140px">
          <option value="">All Severities</option>
          <option>Critical</option><option>High</option><option>Medium</option><option>Low</option><option>Info</option>
        </select>
      </div>
      <div id="findings-list"></div>
    </div>

    <!-- TEMPLATES -->
    <div class="view" id="view-templates">
      <div class="page-hdr">
        <span class="page-title">Templates</span>
        <button class="btn btn-primary" id="btn-new-template">+ New Template</button>
      </div>
      <div id="templates-list"></div>
    </div>

    <!-- TEMPLATE EDITOR -->
    <div class="view" id="view-template-editor">
      <div class="page-hdr" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-nav="templates">&#8592; Templates</button>
          <span class="page-title" id="ted-title">Template Editor</span>
          <span id="ted-dirty" style="color:var(--text2);font-size:12px"></span>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-save-template">Save Template</button>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="field-group"><label class="field-label">Template Name</label><input class="field-input" id="ted-name"></div>
        <div class="field-group"><label class="field-label">Description</label><input class="field-input" id="ted-desc"></div>
      </div>
      <div class="page-hdr" style="margin-bottom:10px">
        <span style="font-weight:600">Sections</span>
        <div style="display:flex;gap:8px">
          <select class="field-select" id="add-sec-type" style="width:auto">
            <option value="text">Text Section</option>
            <option value="table">Table</option>
            <option value="findings">Findings</option>
            <option value="checklist">Checklist</option>
          </select>
          <button class="btn btn-primary btn-sm" id="btn-add-section">+ Add Section</button>
        </div>
      </div>
      <div id="ted-sections"></div>
    </div>

  </div>
</div>

<!-- NEW REPORT MODAL -->
<div class="modal-overlay" id="modal-new-report">
  <div class="modal">
    <div class="modal-hdr"><span>New Report</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-new-report">&#10005;</button></div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Title</label><input class="field-input" id="nr-title" placeholder="Report title"></div>
      <div class="field-group"><label class="field-label">Template</label>
        <select class="field-select" id="nr-template"><option value="">None (blank)</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-new-report">Cancel</button>
      <button class="btn btn-primary" id="btn-create-report">Create</button>
    </div>
  </div>
</div>

<!-- NEW TEMPLATE MODAL -->
<div class="modal-overlay" id="modal-new-template">
  <div class="modal">
    <div class="modal-hdr"><span>New Template</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-new-template">&#10005;</button></div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Template Name</label><input class="field-input" id="nt-name" placeholder="e.g. Web App Pentest"></div>
      <div class="field-group"><label class="field-label">Description</label><input class="field-input" id="nt-desc" placeholder="Optional description"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-new-template">Cancel</button>
      <button class="btn btn-primary" id="btn-create-template">Create</button>
    </div>
  </div>
</div>

<!-- FINDING MODAL -->
<div class="modal-overlay" id="modal-finding">
  <div class="modal">
    <div class="modal-hdr"><span id="fm-title">Add Finding</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-finding">&#10005;</button></div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Title</label><input class="field-input" id="fm-ftitle" placeholder="Finding title"></div>
      <div class="form-row">
        <div class="field-group"><label class="field-label">Severity</label>
          <select class="field-select" id="fm-severity">
            <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option><option>Info</option>
          </select>
        </div>
        <div class="field-group"><label class="field-label">Status</label>
          <select class="field-select" id="fm-status">
            <option value="open">Open</option><option value="remediated">Remediated</option><option value="accepted">Accepted</option>
          </select>
        </div>
      </div>
      <div class="field-group"><label class="field-label">Observation</label><div class="ql-wrap" id="fm-desc"></div></div>      <div class="field-group"><label class="field-label">Discussion</label><div class="ql-wrap" id="fm-discussion"></div></div>      <div class="field-group"><label class="field-label">Recommendations</label><div class="ql-wrap" id="fm-rec"></div></div>      <div class="field-group"><label class="field-label">References</label><div class="ql-wrap" id="fm-refs"></div></div>      <div class="field-group"><label class="field-label">CVSS Score</label><input class="field-input" id="fm-cvss" type="number" min="0" max="10" step="0.1" placeholder="0.0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-finding">Cancel</button>
      <button class="btn btn-primary" id="btn-save-finding">Save Finding</button>
    </div>
  </div>
</div>

<!-- ADD FINDING FROM TEMPLATE MODAL -->
<div class="modal-overlay" id="modal-add-finding">
  <div class="modal" style="width:520px">
    <div class="modal-hdr">
      <span>Add Finding from Template</span>
      <button class="btn btn-ghost btn-sm"
        data-close-modal="modal-add-finding">&#10005;</button>
    </div>
    <div class="modal-body">
      <div id="add-finding-list"
        style="max-height:360px;overflow-y:auto">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost"
        data-close-modal="modal-add-finding">
        Close</button>
    </div>
  </div>
</div>
<!-- CONFIRM DELETE MODAL -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="width:380px">
    <div class="modal-hdr"><span>Confirm Delete</span><button class="btn btn-ghost btn-sm" data-close-modal="modal-confirm">&#10005;</button></div>
    <div class="modal-body"><p id="confirm-msg" style="color:var(--text2)"></p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="modal-confirm">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- ALERT MODAL -->
<div class="modal-overlay" id="modal-alert">
  <div class="modal" style="width:360px">
    <div class="modal-hdr">
      <span id="alert-title">Notice</span>
    </div>
    <div class="modal-body">
      <p id="alert-msg"
        style="color:var(--text2)"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary"
        data-close-modal="modal-alert">OK</button>
    </div>
  </div>
</div>
<div class="toast-root" id="toast-root"></div>

<script>
(function(){
"use strict";

var S={
  reports:[],templates:[],findings:[],
  currentReport:null,currentReportId:null,
  currentTemplate:null,
  edDirty:false,tedDirty:false,
  saveTimer:null,editingFindingId:null,
  editingRFIdx:null
};

function esc(s){
  s=String(s==null?'':s);
  s=s.split('&').join('&amp;');
  s=s.split('<').join('&lt;');
  s=s.split('>').join('&gt;');
  s=s.split('"').join('&quot;');
  return s;
}
function fmtDate(s){
  if(!s)return '';
  try{return new Date(s).toLocaleDateString();}
  catch(e){return s;}
}
function bdg(st){
  var m={
    draft:'badge-draft',review:'badge-review',
    final:'badge-final',open:'badge-open',
    info:'badge-info',remediated:'badge-info',
    accepted:'badge-info'
  };
  var k=(st||'').toLowerCase();
  return '<span class="badge '+(m[k]||'badge-info')+'">'
    +esc(st)+'</span>';
}
function toast(msg,tp){
  var el=document.createElement('div');
  el.className='toast t-'+(tp||'ok');
  el.textContent=msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(function(){el.remove();},3000);
}
function $(id){return document.getElementById(id);}
function gv(id){return $(id)?$(id).value:'';}
function sv(id,v){if($(id))$(id).value=(v==null?'':v);}

var _Q={};
function _qv(k){
  var q=_Q[k];
  if(!q)return '';
  var h=q.root.innerHTML;
  if(h==='<p><br></p>')return '';
  return h;
}
function _qs(k,html){
  var q=_Q[k];
  if(!q)return;
  q.clipboard.dangerouslyPasteHTML(
    html||''
  );
}
function _initQ(id,ph){
  var tb=[
    [{header:[1,2,3,false]}],
    ['bold','italic','underline'],
    [{list:'ordered'},{list:'bullet'}],
    ['link','clean']
  ];
  _Q[id]=new Quill(
    '#'+id,
    {theme:'snow',
     placeholder:ph||'',
     modules:{toolbar:tb}}
  );
}
function initQuills(){
  _initQ('fm-desc','Enter observation...');
  _initQ('fm-discussion','Enter discussion...');
  _initQ('fm-rec','Enter recommendations...');
  _initQ('fm-refs','Enter references...');
}

async function api(path,opts){
  var h={'Content-Type':'application/json'};
  var o=Object.assign({headers:h},opts||{});
  var res=await fetch(path,o);
  if(!res.ok){
    var t=await res.text();
    throw new Error(t||res.statusText);
  }
  if(res.status===204)return null;
  return res.json();
}

function openM(id){$(id).classList.add('open');}
function closeM(id){
  $(id).classList.remove('open');
  if(id==='modal-finding'){
    S.editingRFIdx=null;
  }
}
function alertMsg(msg,title){
  $('alert-msg').textContent=msg;
  $('alert-title').textContent=
    title||'Notice';
  openM('modal-alert');
}

function showView(name){
  var vs=document.querySelectorAll('.view');
  var ts=document.querySelectorAll('.nav-tab');
  for(var i=0;i<vs.length;i++){
    vs[i].classList.remove('active');
  }
  for(var i=0;i<ts.length;i++){
    ts[i].classList.remove('active');
  }
  var v=$('view-'+name);
  if(v)v.classList.add('active');
  var nt=document.querySelectorAll(
    '.nav-tab[data-nav="'+name+'"]');
  for(var i=0;i<nt.length;i++){
    nt[i].classList.add('active');
  }
  if(name==='reports')renderReports();
  if(name==='findings'){
    renderFindingTemplates();
  }
  if(name==='templates')renderTemplates();
  if(name==='dash')renderDash();
}

async function loadAll(){
  try{
    var rep=await api('/api/reports');
    S.reports=rep||[];
  }catch(e){S.reports=[];}
  try{
    var tpl=await api('/api/templates');
    S.templates=tpl||[];
  }catch(e){S.templates=[];}
  try{
    var fin=await api('/api/findings');
    S.findings=fin||[];
  }catch(e){S.findings=[];}
  renderDash();
  popNRTemplates();
  popFindSel();
}

function renderDash(){
  var r=S.reports;
  $('stat-total').textContent=r.length;
  $('stat-draft').textContent=
    r.filter(function(x){
      return x.status==='draft';
    }).length;
  $('stat-review').textContent=
    r.filter(function(x){
      return x.status==='review';
    }).length;
  $('stat-final').textContent=
    r.filter(function(x){
      return x.status==='final';
    }).length;
  var recent=r.slice().sort(function(a,b){
    return (b.updated_at||'')
      .localeCompare(a.updated_at||'');
  }).slice(0,5);
  var el=$('dash-recent');
  if(!recent.length){
    el.innerHTML=
      '<div class="empty"><p>No reports.</p></div>';
    return;
  }
  var rows=recent.map(function(r){
    return '<tr data-open-rpt="'+r.id+'"'
      +' style="cursor:pointer"><td>'
      +esc(r.title)+'</td><td>'
      +bdg(r.status)+'</td><td>'
      +fmtDate(r.updated_at)+'</td></tr>';
  }).join('');
  el.innerHTML='<table><thead><tr>'
    +'<th>Title</th><th>Status</th>'
    +'<th>Updated</th></tr></thead><tbody>'
    +rows+'</tbody></table>';
}

function renderReports(){
  var q=gv('rpt-search').toLowerCase();
  var list=S.reports.filter(function(r){
    return !q||(r.title||'').toLowerCase()
      .indexOf(q)>=0;
  });
  var el=$('reports-list');
  if(!list.length){
    el.innerHTML='<div class="empty"><p>'
      +(q?'No matches.':'No reports yet.')
      +'</p></div>';
    return;
  }
  el.innerHTML='<div class="card-grid">'
    +list.map(function(r){
      return '<div class="card-item">'
        +'<div class="item-title">'
        +esc(r.title)+'</div>'
        +'<div class="item-meta">'
        +bdg(r.status)+' &bull; '
        +fmtDate(r.updated_at)+'</div>'
        +'<div class="item-actions">'
        +'<button class="btn btn-primary btn-sm"'
        +' data-open-rpt="'+r.id+'">'
        +'Open</button>'
        +'<button class="btn btn-danger btn-sm"'
        +' data-del-t="report"'
        +' data-del-id="'+r.id+'"'
        +' data-del-n="'+esc(r.title)+'">'
        +'Delete</button>'
        +'</div></div>';
    }).join('')+'</div>';
}

  openM('modal-new-report');
}
function popNRTemplates(){
  var sel=$('nr-template');
  if(!sel)return;
  sel.innerHTML=
    '<option value="">None (blank)</option>'
    +S.templates.map(function(t){
      return '<option value="'+t.id+'">'
        +esc(t.name)+'</option>';

}
async function createReport(){
  var title=gv('nr-title').trim();
  if(!title){
    toast('Title required','err');
    return;
  }
  var tl=title.toLowerCase();
  var dup=S.reports.find(function(r){
    return (r.title||'')
      .toLowerCase()===tl;
  });
  if(dup){
    alertMsg('Duplicate report name');
    return;
  }
  var tid=gv('nr-template');
  try{
    var r=await api('/api/reports',{
      method:'POST',
      body:JSON.stringify({
        title:title,
        template_id:tid||null,
        status:'draft',sections:[],meta:{}
      })
    });
    S.reports.unshift(r);
    closeM('modal-new-report');
    toast('Report created');
    S.currentReportId=r.id;
    openEditor(r.id);
  }catch(e){
    toast('Create failed: '+e.message,'err');
  }
}

async function openEditor(id){
  try{
    var r=await api('/api/reports/'+id);
    S.currentReport=r;
    S.currentReportId=id;
    S.edDirty=false;
    $('editor-title').textContent=
      r.title||'Untitled';
    $('editor-dirty').textContent='';
    sv('editor-status',r.status||'draft');
    sv('ed-title',r.title);
    var d=r.data||{};
    var m=d.report||{};
    S.currentReport.sections=
      d.sections||[];
    S.currentReport.findings=
      d.findings||[];
    sv('ed-org',m.org||'');
    sv('ed-assessor',m.assessor||'');
    sv('ed-start',m.start_date||'');
    sv('ed-end',m.end_date||'');
    sv('ed-summary',m.summary||'');
    renderEdSections();
    renderEdFindings();
    switchTab('info');
    showView('editor');
  }catch(e){
    toast('Open failed: '+e.message,'err');
  }
}
function switchTab(name){
  var tabs=document.querySelectorAll('.ed-tab');
  var panels=document.querySelectorAll('.ed-panel');
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.remove('active');
  }
  for(var i=0;i<panels.length;i++){
    panels[i].classList.remove('active');
  }
  var p=$('ed-'+name);
  if(p)p.classList.add('active');
  var et=document.querySelectorAll(
    '.ed-tab[data-tab="'+name+'"]');
  for(var i=0;i<et.length;i++){
    et[i].classList.add('active');
  }
  if(name==='preview')renderPreview();
}
function markDirty(){
  S.edDirty=true;
  $('editor-dirty').textContent='unsaved';
  clearTimeout(S.saveTimer);
  S.saveTimer=setTimeout(saveEditor,2000);
}
async function saveEditor(){
  if(!S.currentReport)return;
  var title=gv('ed-title').trim()
    ||S.currentReport.title;
  var tl=title.toLowerCase();
  var rid=S.currentReportId;
  var dup=S.reports.find(function(r){
    return r.id!==rid&&
      (r.title||'').toLowerCase()===tl;
  });
  if(dup){
    alertMsg('Duplicate report name');
    return;
  }
  try{
    var u=await api(
      '/api/reports/'+S.currentReportId,{
      method:'PUT',
      body:JSON.stringify({
        title:title,
        org:gv('ed-org'),
        status:S.currentReport.status,
        data:{
          report:{
            title:title,
            org:gv('ed-org'),
            assessor:gv('ed-assessor'),
            start_date:gv('ed-start'),
            end_date:gv('ed-end'),
            summary:
              gv('ed-summary'),
            scope:''
          },
          sections:
            S.currentReport.sections||[],
          findings:
            S.currentReport.findings||[]
        }
      })
    });
    if(u&&u.updated_at){
      S.currentReport.updated_at=u.updated_at;
    }
    S.currentReport.title=title;
    S.edDirty=false;
    $('editor-dirty').textContent='';
    $('editor-title').textContent=title;
    var rid=S.currentReportId;
    var idx=S.reports.findIndex(function(r){
      return r.id===rid;
    });
    if(idx>=0){
      S.reports[idx].title=title;
      if(u&&u.updated_at){
        S.reports[idx].updated_at=
          u.updated_at;
      }
    }
    toast('Saved');
  }catch(e){
    toast('Save failed: '+e.message,'err');
  }
}
async function updateStatus(){
  if(!S.currentReport)return;
  S.currentReport.status=gv('editor-status');
  await saveEditor();
}
function renderEdSections(){
  var el=$('ed-sections-body');
  if(!el)return;
  var secs=
    (S.currentReport&&S.currentReport.sections)||[];
  if(!secs.length){
    el.innerHTML=
      '<div class="empty"><p>No sections.</p></div>';
    return;
  }
  el.innerHTML=secs.map(function(sec,i){
    var flds=(sec.fields||[]).map(function(f){
      var inp=f.type==='textarea'
        ?'<textarea class="field-textarea">'
          +esc(f.value||'')+'</textarea>'
        :'<input class="field-input" type="'
          +esc(f.type||'text')+'" value="'
          +esc(f.value||'')+'">';
      return '<div class="field-group">'
        +'<label class="field-label">'
        +esc(f.label)+'</label>'
        +inp+'</div>';
    }).join('');
    return '<div class="sec-hdr"'
      +' data-tog-sec="'+i+'">'
      +esc(sec.title||'Section '+(i+1))
      +'</div>'
      +'<div class="sec-body" id="rsec-'+i+'">'
      +(flds||'<p>No fields.</p>')
      +'</div>';
  }).join('');
}
function renderPreview(){
  var r=S.currentReport;if(!r)return;
  var d=(r.data||{});
  var m=d.report||{};
  var h='<h1 style="font-size:18px;font-weight:700;'
    +'margin-bottom:8px">'+esc(r.title)+'</h1>';
  if(m.org)
    h+='<p><b>Org:</b> '+esc(m.org)+'</p>';
  if(m.assessor)
    h+='<p><b>Assessor:</b> '+esc(m.assessor)+'</p>';
  if(m.summary)
    h+='<h2>Summary</h2><p>'+esc(m.summary)+'</p>';
  (r.sections||[]).forEach(function(sec){
    h+='<h2>'+esc(sec.title)+'</h2>';
    (sec.fields||[]).forEach(function(f){
      h+='<p><b>'+esc(f.label)+':</b> '
        +esc(f.value||'')+'</p>';
    });
  });
  var rf=r.findings||[];
  if(rf.length){
    h+='<h2>Findings ('+rf.length+')</h2>';
    rf.forEach(function(f){
      h+='<div style="margin-bottom:10px"><b>'
        +esc(f.title)+'</b> '
        +bdg(f.severity||'info')+'<p>'
        +esc(f.description||'')+'</p></div>';
    });
  }
  $('preview-content').innerHTML=h;
}

function renderEdFindings(){
  var el=$('ed-findings-list');
  if(!el||!S.currentReport)return;
  var list=
    S.currentReport.findings||[];
  if(!list.length){
    el.innerHTML=
      '<div class="empty"><p>'
      +'No findings. Use &ldquo;Add from'
      +' Template&rdquo; to insert one.'
      +'</p></div>';
    return;
  }
  el.innerHTML=list.map(function(f,i){
    return rfCard(f,i);
  }).join('');
}
function rfCard(f,idx){
  var sev=(f.severity||'info').toLowerCase();
  return '<div class="fcard">'
    +'<div style="display:flex;'
    +'align-items:center;'
    +'margin-bottom:6px">'
    +'<span class="fsev sev-'
    +esc(sev)+'">'
    +esc(f.severity)+'</span>'
    +'<strong>'+esc(f.title)+'</strong>'
    +'<span style="margin-left:auto">'
    +bdg(f.status||'open')+'</span></div>'
    +'<div style="color:var(--text2);'
    +'font-size:12px;margin-bottom:8px">'
    +esc(f.description||'')+'</div>'
    +'<div class="item-actions">'
    +'<button class="btn btn-ghost btn-sm"'
    +' data-edit-rf="'+idx+'">'
    +'Edit</button>'
    +'<button class="btn btn-danger btn-sm"'
    +' data-rm-rf="'+idx+'">'
    +'Remove</button>'
    +'</div></div>';
}

function editFinding(id){

    return x.id===id;
  });
  if(!f)return;
  S.editingFindingId=id;
  $('fm-title').textContent='Edit Template';
  sv('fm-ftitle',f.title);
  _qs('fm-desc',f.description||'');
  _qs('fm-discussion',f.discussion||'');
  _qs('fm-rec',f.recommendation||'');
  _qs('fm-refs',f.refs||'');
  sv('fm-cvss',f.cvss||'');
  sv('fm-severity',f.severity||'Medium');
  sv('fm-status',f.status||'open');

async function saveFinding(){
  var title=gv('fm-ftitle').trim();
  if(!title){
    toast('Title required','err');
    return;
  }
  if(S.editingRFIdx!=null){
    saveReportFinding();
    return;
  }
  var p={
    title:title,
    severity:gv('fm-severity'),
    status:gv('fm-status'),
    description:_qv('fm-desc'),
    discussion:_qv('fm-discussion'),
    recommendation:_qv('fm-rec'),
    refs:_qv('fm-refs'),
    cvss:parseFloat(gv('fm-cvss'))||null
  };
  try{
    if(S.editingFindingId){
      var u=await api(
        '/api/findings/'+S.editingFindingId,
        {method:'PUT',body:JSON.stringify(p)});
      var idx=S.findings.findIndex(
        function(f){
          return f.id===S.editingFindingId;
        });
      if(idx>=0)S.findings[idx]=u;
      toast('Template updated');
    }else{
      var c=await api('/api/findings',
        {method:'POST',body:JSON.stringify(p)});
      S.findings.push(c);
      toast('Template created');
    }
    closeM('modal-finding');
    renderFindingTemplates();
  }catch(e){
    toast('Save failed: '+e.message,'err');
  }
}
function openAddFindingToReport(){
  var el=$('add-finding-list');
  if(!el)return;
  if(!S.findings.length){
    el.innerHTML=
      '<div class="empty"><p>'
      +'No finding templates. Create some'
      +' in Finding Templates first.'
      +'</p></div>';
  }else{
    var ord={
      Critical:0,High:1,Medium:2,
      Low:3,Info:4
    };
    var sorted=S.findings.slice().sort(
      function(a,b){
        return (ord[a.severity]||5)
          -(ord[b.severity]||5);
      });
    el.innerHTML=sorted.map(function(f){
      var sev=
        (f.severity||'info').toLowerCase();
      return '<div class="fcard"'
        +' style="margin-bottom:10px">'
        +'<div style="display:flex;'
        +'align-items:center;'
        +'margin-bottom:4px">'
        +'<span class="fsev sev-'
        +esc(sev)+'">'
        +esc(f.severity)+'</span>'
        +'<strong>'+esc(f.title)+'</strong>'
        +'</div>'
        +'<div style="color:var(--text2);'
        +'font-size:12px;margin-bottom:6px">'
        +esc(f.description||'')+'</div>'
        +'<button class="btn btn-primary btn-sm"'
        +' data-add-rf="'+f.id+'">'
        +'Add to Report</button>'
        +'</div>';
    }).join('');
  }
  openM('modal-add-finding');
}
function addFindingToReport(tplId){
  var f=S.findings.find(function(x){
    return x.id===tplId;
  });
  if(!f||!S.currentReport)return;
  var copy={
    id:'rf-'+(Date.now()),
    template_id:tplId,
    title:f.title,
    severity:f.severity,
    status:f.status||'open',
    description:f.description||'',
    discussion:f.discussion||'',
    recommendation:f.recommendation||'',
    refs:f.refs||'',
    cvss:f.cvss||null
  };
  S.currentReport.findings=
    S.currentReport.findings||[];
  S.currentReport.findings.push(copy);
  closeM('modal-add-finding');
  renderEdFindings();
  markDirty();
  toast('Finding added');
}
function editReportFinding(idx){
  var list=S.currentReport&&
    S.currentReport.findings||[];
  var f=list[idx];
  if(!f)return;
  S.editingFindingId=null;
  S.editingRFIdx=idx;
  $('fm-title').textContent='Edit Finding';
  sv('fm-ftitle',f.title);
  _qs('fm-desc',f.description||'');
  _qs('fm-discussion',f.discussion||'');
  _qs('fm-rec',f.recommendation||'');
  _qs('fm-refs',f.refs||'');
  sv('fm-cvss',f.cvss||'');
  sv('fm-severity',f.severity||'Medium');
  sv('fm-status',f.status||'open');
  openM('modal-finding');
}
async function saveReportFinding(){
  var idx=S.editingRFIdx;
  var list=S.currentReport&&
    S.currentReport.findings||[];
  if(idx==null||!list[idx])return;
  var title=gv('fm-ftitle').trim();
  if(!title){
    toast('Title required','err');
    return;
  }
  list[idx].title=title;
  list[idx].severity=gv('fm-severity');
  list[idx].status=gv('fm-status');
  list[idx].description=_qv('fm-desc');
  list[idx].discussion=_qv('fm-discussion');
  list[idx].recommendation=_qv('fm-rec');
  list[idx].refs=_qv('fm-refs');
  list[idx].cvss=
    parseFloat(gv('fm-cvss'))||null;
  closeM('modal-finding');
  S.editingRFIdx=null;
  renderEdFindings();
  markDirty();
  toast('Finding updated');
}

function renderFindingTemplates(){
  var el=$('findings-list');if(!el)return;

      +'No finding templates yet.'

  var ord={Critical:0,High:1,Medium:2,
    Low:3,Info:4};

    function(a,b){
      return (ord[a.severity]||5)
        -(ord[b.severity]||5);

  el.innerHTML=list.map(fCard).join('');

  if(!name){toast('Name required','err');return;}
  try{
    var t=await api('/api/templates',{

      body:JSON.stringify({
        name:name,
        description:gv('nt-desc'),
        sections:[]
      })
    });
    S.templates.push(t);
    closeM('modal-new-template');
    toast('Template created');
    openTplEditor(t.id);
  }catch(e){
    toast('Failed: '+e.message,'err');
  }
}
async function openTplEditor(id){
  try{
    var t=await api('/api/templates/'+id);
    S.currentTemplate=t;
    S.tedDirty=false;
    $('ted-title').textContent=
      t.name||'Template Editor';
    $('ted-dirty').textContent='';
    sv('ted-name',t.name);
    sv('ted-desc',t.description||'');
    renderTSections();
    showView('template-editor');
  }catch(e){
    toast('Failed: '+e.message,'err');
  }
}
function markTDirty(){
  S.tedDirty=true;
  $('ted-dirty').textContent='unsaved';
}
function addSection(){
  if(!S.currentTemplate)return;
  var tp=gv('add-sec-type');
  S.currentTemplate.sections=
    S.currentTemplate.sections||[];
  S.currentTemplate.sections.push(
    {title:'New section',type:tp,fields:[]});
  markTDirty();renderTSections();
}
function renderTSections(){
  var el=$('ted-sections');if(!el)return;
  var secs=(S.currentTemplate&&
    S.currentTemplate.sections)||[];
  if(!secs.length){
    el.innerHTML=
      '<div class="empty"><p>No sections.</p></div>';
    return;
  }
  el.innerHTML=secs.map(function(sec,si){
    var flds=(sec.fields||[]).map(function(f,fi){
      var opts=
        ['text','textarea','date','number','select']
        .map(function(o){
          return '<option value="'+o+'"'
            +(f.type===o?' selected':'')+'>'
            +o+'</option>';
        }).join('');
      return '<div class="form-row"'
        +' style="margin-bottom:8px;'
        +'align-items:end">'
        +'<div class="field-group" style="margin:0">'
        +'<label class="field-label">Label</label>'
        +'<input class="field-input"'
        +' data-si="'+si+'" data-fi="'+fi+'"'
        +' data-prop="label"'
        +' value="'+esc(f.label||'')+'"></div>'
        +'<div class="field-group" style="margin:0">'
        +'<label class="field-label">Type</label>'
        +'<select class="field-select"'
        +' data-si="'+si+'" data-fi="'+fi+'"'
        +' data-prop="type">'+opts+'</select></div>'
        +'<button class="btn btn-danger btn-sm'
        +' btn-icon"'
        +' data-rm-fi="'+fi+'" data-si="'+si+'">'
        +'&#10005;</button></div>';
    }).join('');
    return '<div class="card"'
      +' style="margin-bottom:12px">'
      +'<div style="display:flex;'
      +'align-items:center;'
      +'margin-bottom:10px;gap:8px">'
      +'<input class="field-input" style="flex:1"'
      +' data-sec-title="'+si+'"'
      +' value="'+esc(sec.title)+'">'
      +'<span style="font-size:12px;'
      +'color:var(--text2)">'
      +esc(sec.type)+'</span>'
      +'<button class="btn btn-danger btn-sm btn-icon"'
      +' data-rm-sec="'+si+'">'
      +'&#10005;</button></div>'
      +(flds||'<p style="color:var(--text2);'
        +'font-size:12px">No fields.</p>')
      +'<button class="btn btn-secondary btn-sm"'
      +' style="margin-top:8px"'
      +' data-add-fi="'+si+'">'
      +'+ Add Field</button></div>';
  }).join('');
}
function rmSection(si){
  if(!S.currentTemplate)return;
  S.currentTemplate.sections.splice(si,1);
  markTDirty();renderTSections();
}
function addField(si){
  if(!S.currentTemplate)return;
  S.currentTemplate.sections[si].fields=
    S.currentTemplate.sections[si].fields||[];
  S.currentTemplate.sections[si].fields.push(
    {label:'New Field',type:'text',value:''});
  markTDirty();renderTSections();
}
function rmField(si,fi){
  if(!S.currentTemplate)return;
  S.currentTemplate.sections[si].fields
    .splice(fi,1);
  markTDirty();renderTSections();
}
async function saveTemplate(){
  if(!S.currentTemplate)return;
  var name=gv('ted-name').trim();
  if(!name){toast('Name required','err');return;}
  S.currentTemplate.name=name;
  S.currentTemplate.description=gv('ted-desc');
  try{
    var u=await api(
      '/api/templates/'+S.currentTemplate.id,{
      method:'PUT',
      body:JSON.stringify({
        name:S.currentTemplate.name,
        description:S.currentTemplate.description,
        sections:S.currentTemplate.sections
      })
    });
    S.currentTemplate=u;
    S.tedDirty=false;
    $('ted-dirty').textContent='';
    var idx=S.templates.findIndex(function(t){
      return t.id===u.id;
    });
    if(idx>=0)S.templates[idx]=u;
    toast('Template saved');
  }catch(e){
    toast('Save failed: '+e.message,'err');
  }
}

function confirmDel(type,id,name){
  $('confirm-msg').textContent=
    'Delete "'+name+'"? Cannot be undone.';
  $('confirm-ok').onclick=function(){
    doDel(type,id);
    closeM('modal-confirm');
  };
  openM('modal-confirm');
}
async function doDel(type,id){
  try{
    await api('/api/'+type+'s/'+id,
      {method:'DELETE'});
    if(type==='report'){
      S.reports=S.reports.filter(function(r){
        return r.id!==id;
      });
      S.findings=S.findings.filter(function(f){
        return f.report_id!==id;
      });
      renderReports();renderDash();
    }else if(type==='template'){
      S.templates=S.templates.filter(function(t){
        return t.id!==id;
      });
      renderTemplates();
    }else if(type==='finding'){
      S.findings=S.findings.filter(function(f){
        return f.id!==id;
      });
      renderFindingTemplates();
    }
    toast(type.charAt(0).toUpperCase()
      +type.slice(1)+' deleted');
  }catch(e){
    toast('Delete failed: '+e.message,'err');
  }
}

document.addEventListener('click',function(e){
  var t=e.target;
  var nav=t.closest('[data-nav]');
  if(nav){
    showView(nav.getAttribute('data-nav'));
    return;
  }
  var cm=t.closest('[data-close-modal]');
  if(cm){
    closeM(cm.getAttribute(
      'data-close-modal'));
    return;
  }
  var et=t.closest('[data-tab]');
  if(et){switchTab(et.getAttribute('data-tab'));return;}
  var or=t.closest('[data-open-rpt]');
  if(or){
    e.stopPropagation();
    openEditor(
      or.getAttribute('data-open-rpt'));
    return;
  }
  var ot=t.closest('[data-open-tpl]');
  if(ot){
    openTplEditor(
      ot.getAttribute('data-open-tpl'));
    return;
  }
  var ef=t.closest('[data-edit-f]');
  if(ef){
    editFinding(
      ef.getAttribute('data-edit-f'));
    return;
  }
  var erf=t.closest('[data-edit-rf]');
  if(erf){
    editReportFinding(
      parseInt(
        erf.getAttribute('data-edit-rf')));
    return;
  }
  var arf=t.closest('[data-add-rf]');
  if(arf){
    addFindingToReport(
      arf.getAttribute('data-add-rf'));
    return;
  }
  var rrf=t.closest('[data-rm-rf]');
  if(rrf){
    var rfi=parseInt(
      rrf.getAttribute('data-rm-rf'));
    if(S.currentReport&&
      S.currentReport.findings){
      S.currentReport.findings
        .splice(rfi,1);
      renderEdFindings();
      markDirty();
    }
    return;
  }
  var dl=t.closest('[data-del-t]');
  if(dl){
    e.stopPropagation();
    confirmDel(
      dl.getAttribute('data-del-t'),
      dl.getAttribute('data-del-id'),
      dl.getAttribute('data-del-n'));
    return;
  }
  var ts=t.closest('[data-tog-sec]');
  if(ts){
    var idx=parseInt(
      ts.getAttribute('data-tog-sec'));
    var sb=$('rsec-'+idx);
    if(sb)sb.style.display=
      sb.style.display==='none'?'':'none';
    return;
  }
  var rs=t.closest('[data-rm-sec]');
  if(rs){
    rmSection(
      parseInt(rs.getAttribute('data-rm-sec')));
    return;
  }
  var af=t.closest('[data-add-fi]');
  if(af){
    addField(parseInt(af.getAttribute('data-add-fi')));
    return;
  }
  var rf=t.closest('[data-rm-fi]');
  if(rf){
    rmField(
      parseInt(rf.getAttribute('data-si')),
      parseInt(rf.getAttribute('data-rm-fi')));
    return;
  }
  var b=t.closest('button');
  var bid=b?b.id:'';
  if(bid==='theme-toggle'){
    toggleTheme();return;
  }
  if(bid==='btn-new-report'){
    openNewReport();return;
  }
  if(bid==='btn-create-report'){
    createReport();return;
  }
  if(bid==='btn-save-editor'){saveEditor();return;}
  if(bid==='btn-add-finding-ed'){
    openAddFindingToReport();
    return;
  }
  if(bid==='btn-new-finding-tpl'){
    openFinding();return;
  }
  if(bid==='btn-save-finding'){
    saveFinding();return;
  }
  if(bid==='btn-new-template'){
    openNewTemplate();return;
  }
  if(bid==='btn-create-template'){
    createTemplate();return;
  }
  if(bid==='btn-save-template'){
    saveTemplate();return;
  }
  if(bid==='btn-add-section'){addSection();return;}
});

document.addEventListener('change',function(e){
  var t=e.target;
  if(t.id==='editor-status'){updateStatus();return;}
  if(t.id==='findings-rpt-sel'
    ||t.id==='findings-sev-sel'){
    renderFindings();return;
  }
  var si=t.getAttribute('data-si');
  var fi=t.getAttribute('data-fi');
  var prop=t.getAttribute('data-prop');
  if(si!==null&&fi!==null&&prop){
    S.currentTemplate
      .sections[parseInt(si)]
      .fields[parseInt(fi)][prop]=t.value;
    markTDirty();renderTSections();
  }
});

document.addEventListener('input',function(e){
  var t=e.target;
  var edF=['ed-title','ed-org','ed-assessor',
    'ed-start','ed-end','ed-summary'];
  if(edF.indexOf(t.id)>=0){markDirty();return;}
  if(t.id==='rpt-search'){renderReports();return;}
  var st=t.getAttribute('data-sec-title');
  if(st!==null){
    S.currentTemplate
      .sections[parseInt(st)].title=t.value;
    markTDirty();return;
  }
  var si=t.getAttribute('data-si');
  var fi=t.getAttribute('data-fi');
  var prop=t.getAttribute('data-prop');
  if(si!==null&&fi!==null&&prop){
    S.currentTemplate
      .sections[parseInt(si)]
      .fields[parseInt(fi)][prop]=t.value;
    markTDirty();
  }
});

function _applyTheme(dark){
  if(dark){
    document.body.classList.add('dark');
    var b=$('theme-toggle');
    if(b)b.textContent='Light Mode';
  }else{
    document.body.classList.remove('dark');
    var b=$('theme-toggle');
    if(b)b.textContent='Dark Mode';
  }
}
function toggleTheme(){
  var dark=document.body
    .classList.contains('dark');
  _applyTheme(!dark);
  try{
    localStorage.setItem(
      'rf-theme',dark?'light':'dark');
  }catch(e){}
}
(function(){
  try{
    var t=localStorage.getItem('rf-theme');
    _applyTheme(t==='dark');
  }catch(e){_applyTheme(false);}
})();
loadAll();
initQuills();
})();
</script>
</body>
</html>
